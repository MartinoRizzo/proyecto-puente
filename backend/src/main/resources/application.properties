# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:proyectopuente}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# OAuth2 Client Configurations (Placeholders for Google & GitHub)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id-placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret-placeholder}
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:github-client-id-placeholder}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:github-client-secret-placeholder}
spring.security.oauth2.client.registration.github.scope=user:email
